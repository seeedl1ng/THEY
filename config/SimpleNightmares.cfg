##########################################################################################################
# nightmare
#--------------------------------------------------------------------------------------------------------#
# Nightmare Configuration
##########################################################################################################

nightmare {
    # Chance for hostile mobs to drop a moon fragment during the night. 
    # Fragment drop chance scales linearly with moon phase, from 0 at new moon to the set chance at full moon. [range: 0.0 ~ 1.0, default: 0.02]
    S:dropMoonFragmentChance=0.02

    # Enable of Disable the nightmare events. [default: true]
    B:enableNightmares=true

    # The chance (%) for the player to have a nightmare. [range: 0.0 ~ 100.0, default: 10.0]
    S:nightmareChance=10.0
}


