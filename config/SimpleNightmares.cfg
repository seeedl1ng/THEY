# Configuration file

##########################################################################################################
# ambush
#--------------------------------------------------------------------------------------------------------#
# Ambush Configuration
##########################################################################################################

ambush {
    # The chance for a player to get an ambush when sleeping [range: 0.0 ~ 1.0, default: 0.05]
    S:ambushChance=0.05

    # Maximum distance an ambush mob can spawn from the player. Must be bigger than the minimal value. [range: 2 ~ 128, default: 20]
    I:distanceFromPlayerMax=20

    # Minimal distance an ambush mob can spawn from the player. Must be smaller than the maximum value [range: 1 ~ 64, default: 5]
    I:distanceFromPlayerMin=5

    # Enable or Disable ambushes when sleeping. [default: true]
    B:enableAmbush=true

    # Change the maximum Y level above the player that ambush mobs can spawn. [range: 1 ~ 128, default: 10]
    I:maxYLevelAbovePlayer=10

    # Change the maximum Y level below the player that ambush mobs can spawn [range: 1 ~ 32, default: 6]
    I:maxYLevelBelowPlayer=6

    # Toggle if an ambush can only happen if the player is sleeping in the open (exposed to the sky) [default: false]
    B:needsOpenSky=false
}


