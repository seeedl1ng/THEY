##########################################################################################################
# sleep
#--------------------------------------------------------------------------------------------------------#
# Sleep Configuration:
##########################################################################################################

sleep {
    # List of Chat messages as feedback for sleeping in multiplayer. [default: [Look alive soldier! Time for Pain!], [The power of Ra is blasting your eyes. You awake from your crypt.], [Narrator speaking, time to get your butt moving.], [A grue quickly moves away after having stalked you throughout the night, good morning!], [You wake up remembering vague images of a forgotten world.], [Don't keep the devil waiting, my friend.], [You just lost 10 minutes of progression.], [You woke up on the wrong side of the bed today...], [At least you don't need to get ready for school.], [Another day, another emerald.], [A Champion was supposed to spawn last night, but no... You just had to sleep.], [The §4§k Cities of the Lost§r are waiting...]]
    S:ChatFeedback <
        Look alive soldier! Time for Pain!
        The power of Ra is blasting your eyes. You awake from your crypt.
        Narrator speaking, time to get your butt moving.
        A grue quickly moves away after having stalked you throughout the night, good morning!
        You wake up remembering vague images of a forgotten world.
        Don't keep the devil waiting, my friend.
        You just lost 10 minutes of progression.
        You woke up on the wrong side of the bed today...
        At least you don't need to get ready for school.
        Another day, another emerald.
        A Champion was supposed to spawn last night, but no... You just had to sleep.
        The §4§k Cities of the Lost§r are waiting...
     >

    # Enable or Disable the 'player is sleeping' feedback in chat [default: true]
    B:enableChatFeedback=true

    # Enable or Disable the dream feedback in chat when sleeping in multiplayer. [default: true]
    B:enableChatRemarks=true

    # Helper config option. If singlePlayerDebug is enabled but this option is disabled, 'player is sleeping' feedback will not occur when 1 player is in the world. [default: true]
    B:enableSinglePlayerChatFeedback=true

    # Enable or Disable the sleep percentage chat messages for singleplayer. Usually for debug purposes only. [default: false]
    B:enableSinglePlayerDebug=false

    # Set the color for the 'is now sleeping' message. Color name must match TextFormatting enums. [default: GOLD]
    S:sleepMessageColor=GOLD

    # The percentage of players that needs to sleep to skip the night, if this option is selected. ONLY ALTER THROUGH IN GAME COMMAND /setsleeppercentage [range: 0 ~ 100, default: 100]
    I:sleepPercentage=100

    # The amount of players that need to sleep to skip the night, if this option is selected. ONLY ALTER THROUGH IN GAME COMMAND /setsleeppercentage [range: -1 ~ 99, default: -1]
    I:sleepPlayers=-1

    # Set the color for the wake up chat remarks. Color name must match TextFormatting enums. [default: GOLD]
    S:wakeUpMessageColor=GOLD
}


